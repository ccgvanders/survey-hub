<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Year 10 Data Analytics — Student Research Surveys</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,600;1,400&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #24356f;
    --navy-light: #2e4494;
    --burgundy: #991b2a;
    --bg: #f4f3f0;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.08);
    --border-med: rgba(0,0,0,0.14);
    --border-hover: rgba(36,53,111,0.35);
    --text-primary: #1a1a1a;
    --text-secondary: #555;
    --text-muted: #999;
    --amber-bg: #fff4e0;
    --amber-text: #7a4200;
    --amber-bar: #e09118;
    --blue-bg: #e6f0fb;
    --blue-text: #1a4f8a;
    --blue-bar: #2f7dd4;
    --green-bg: #e8f5e1;
    --green-text: #245c14;
    --green-bar: #4a9a2a;
    --muted-bg: #eeece9;
    --muted-text: #999;
    --audience-bg: #f0eef8;
    --audience-text: #3d2d7a;
    --radius: 14px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 0;
  }

  .page-wrap {
    max-width: 1020px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 3rem;
  }

  .page-header {
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1.5px solid var(--border-med);
  }

  .page-header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    font-weight: 400;
    color: var(--navy);
    line-height: 1.2;
    margin-bottom: 0.6rem;
  }

  .page-header p {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.65;
  }

  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 1.25rem;
  }

  .legend {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--text-secondary);
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .sort-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .sort-chip {
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border-med);
    cursor: pointer;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    background: var(--surface);
    color: var(--text-secondary);
    transition: all 0.15s;
  }

  .sort-chip:hover { border-color: var(--navy); color: var(--navy); }

  .sort-chip.active {
    background: var(--navy);
    border-color: var(--navy);
    color: #fff;
    font-weight: 600;
  }

  .survey-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 14px;
  }

  .survey-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.15rem 1.2rem 1.05rem;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: box-shadow 0.2s, border-color 0.2s, transform 0.2s;
    animation: fadeUp 0.35s ease both;
  }

  .survey-card:hover {
    box-shadow: 0 6px 24px rgba(36,53,111,0.1);
    border-color: var(--border-hover);
    transform: translateY(-2px);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 6px;
  }

  .card-meta {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .card-author {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .card-audience {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 600;
    color: var(--audience-text);
    background: var(--audience-bg);
    padding: 2px 7px;
    border-radius: 20px;
    width: fit-content;
  }

  .response-badge {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .badge-low  { background: var(--amber-bg); color: var(--amber-text); }
  .badge-mid  { background: var(--blue-bg);  color: var(--blue-text); }
  .badge-good { background: var(--green-bg); color: var(--green-text); }
  .badge-none { background: var(--muted-bg); color: var(--muted-text); }

  .card-topic-wrap {
    display: flex;
    align-items: flex-start;
    gap: 7px;
  }

  .card-emoji {
    font-size: 20px;
    line-height: 1.2;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .card-topic {
    font-size: 15px;
    font-weight: 600;
    color: var(--navy);
    line-height: 1.3;
  }

  .card-question {
    font-size: 12.5px;
    color: var(--text-secondary);
    line-height: 1.55;
    flex: 1;
    font-style: italic;
  }

  .card-footer {
    margin-top: 2px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 9px;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 10.5px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .progress-bar-bg {
    height: 5px;
    background: #e8e6e1;
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.7s cubic-bezier(0.4,0,0.2,1);
  }

  .fill-low  { background: var(--amber-bar); }
  .fill-mid  { background: var(--blue-bar); }
  .fill-good { background: var(--green-bar); }

  .take-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    color: var(--surface);
    background: var(--navy);
    border: none;
    border-radius: var(--radius-sm);
    padding: 8px 14px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s, transform 0.1s;
    width: 100%;
  }

  .take-btn:hover {
    background: var(--navy-light);
    transform: translateY(-1px);
  }

  .take-btn:active { transform: translateY(0); }

  .take-btn.disabled {
    color: var(--muted-text);
    background: var(--muted-bg);
    cursor: default;
    pointer-events: none;
    font-weight: 400;
  }

  .updated-note {
    text-align: right;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 1.75rem;
  }

  svg.icon {
    width: 12px;
    height: 12px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    vertical-align: middle;
    flex-shrink: 0;
  }

  @media (max-width: 600px) {
    .page-wrap { padding: 1.5rem 1rem 2.5rem; }
    .page-header h1 { font-size: 22px; }
    .survey-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .card-emoji { font-size: 18px; }
    .card-topic { font-size: 13px; }
    .card-question { font-size: 11.5px; }
  }

  @media (max-width: 400px) {
    .survey-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="page-wrap">

  <header class="page-header">
    <h1 id="pageTitle">Loading...</h1>
    <p id="pageSubtitle"></p>
  </header>

  <div class="controls">
    <div class="legend">
      <span class="legend-item"><span class="legend-dot" style="background:var(--amber-bar)"></span>Needs responses</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--blue-bar)"></span>Getting there</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--green-bar)"></span>Target reached</span>
    </div>
    <div class="sort-row">
      <span>Sort:</span>
      <button class="sort-chip active" onclick="sortCards('needs', this)">Needs help first</button>
      <button class="sort-chip" onclick="sortCards('alpha', this)">A–Z</button>
    </div>
  </div>

  <div class="survey-grid" id="surveyGrid"></div>
  <p class="updated-note" id="updatedNote"></p>

</div>
<script>
  let allSurveys = [];

  function getBadge(r, t, hasLink) {
    if (!hasLink) return { cls: 'badge-none', label: 'Coming soon' };
    const pct = r / t;
    if (pct >= 1)   return { cls: 'badge-good', label: `${r} responses ✓` };
    if (pct >= 0.5) return { cls: 'badge-mid',  label: `${r} / ${t}` };
    return             { cls: 'badge-low',  label: `${r} / ${t}` };
  }

  function getFill(r, t) {
    const pct = r / t;
    if (pct >= 1)   return 'fill-good';
    if (pct >= 0.5) return 'fill-mid';
    return 'fill-low';
  }

  function externalIcon() {
    return `<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;
  }

  function clockIcon() {
    return `<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
  }

  function personIcon() {
    return `<svg class="icon" viewBox="0 0 24 24" aria-hidden="true" style="width:10px;height:10px"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`;
  }

  function buildCard(s, index) {
    const hasLink = !!s.link;
    const pct = hasLink ? Math.min(s.responses / s.target, 1) : 0;
    const barWidth = Math.round(pct * 100);
    const badge = getBadge(s.responses, s.target, hasLink);
    const fill = getFill(s.responses, s.target);
    const remaining = s.target - s.responses;
    const progressLabel = !hasLink
      ? 'Survey link coming soon'
      : s.responses >= s.target
        ? 'Target reached!'
        : `${remaining} more needed`;

    const btn = hasLink
      ? `<a class="take-btn" href="${s.link}" target="_blank" rel="noopener">Take survey ${externalIcon()}</a>`
      : `<button class="take-btn disabled">${clockIcon()} Coming soon</button>`;

    return `
      <article class="survey-card" style="animation-delay:${index * 45}ms">
        <div class="card-top">
          <div class="card-meta">
            <span class="card-author">${s.student}</span>
            <span class="card-audience">${personIcon()} ${s.audience}</span>
          </div>
          <span class="response-badge ${badge.cls}">${badge.label}</span>
        </div>
        <div class="card-topic-wrap">
          <span class="card-emoji" aria-hidden="true">${s.emoji}</span>
          <p class="card-topic">${s.topic}</p>
        </div>
        <p class="card-question">${s.question}</p>
        <div class="card-footer">
          <div>
            <div class="progress-meta">
              <span>${progressLabel}</span>
              <span>${hasLink ? barWidth + '%' : ''}</span>
            </div>
            <div class="progress-bar-bg">
              <div class="progress-bar-fill ${fill}" style="width:${barWidth}%"></div>
            </div>
          </div>
          ${btn}
        </div>
      </article>`;
  }

  function renderCards(data) {
    document.getElementById('surveyGrid').innerHTML =
      data.map((s, i) => buildCard(s, i)).join('');
  }

  function sortCards(mode, el) {
    document.querySelectorAll('.sort-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    let sorted = [...allSurveys];
    if (mode === 'needs') {
      sorted.sort((a, b) => {
        const hasA = a.link ? 1 : 0, hasB = b.link ? 1 : 0;
        if (hasA !== hasB) return hasA - hasB;
        return (a.responses / a.target) - (b.responses / b.target);
      });
    }
    if (mode === 'alpha') sorted.sort((a, b) => a.topic.localeCompare(b.topic));
    renderCards(sorted);
  }

  fetch('surveys.json')
    .then(r => r.json())
    .then(data => {
      document.getElementById('pageTitle').textContent = data.pageTitle;
      document.getElementById('pageSubtitle').innerHTML = data.pageSubtitle;
      allSurveys = data.surveys;

      const sorted = [...allSurveys].sort((a, b) => {
        const hasA = a.link ? 1 : 0, hasB = b.link ? 1 : 0;
        if (hasA !== hasB) return hasA - hasB;
        return (a.responses / a.target) - (b.responses / b.target);
      });
      renderCards(sorted);

      const now = new Date();
      document.getElementById('updatedNote').textContent =
        `Response counts last updated: ${now.toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' })}`;
    })
    .catch(() => {
      document.getElementById('pageTitle').textContent = 'Survey Hub';
      document.getElementById('surveyGrid').innerHTML =
        '<p style="color:#888;font-size:14px;grid-column:1/-1;">Could not load survey data. Please ensure surveys.json is in the same folder as this file.</p>';
    });
</script>
</body>
</html>
